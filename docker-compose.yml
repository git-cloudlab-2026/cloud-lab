services:
  postgres:
    image: postgres:16-alpine
    container_name: cloud-lab-postgres
    environment:
      POSTGRES_USER: cloud_lab_dev
      POSTGRES_PASSWORD: cloud_lab_dev_password
      POSTGRES_DB: cloud_lab
    ports:
      - "5432:5432"
    volumes:
      - cloud_lab_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloud_lab_dev -d cloud_lab"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./server
    container_name: cloud-lab-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      AUTH_MODE: mock
      SESSION_SECRET: dev-only-docker-session-secret-change-me
      DATABASE_URL: postgres://cloud_lab_dev:cloud_lab_dev_password@postgres:5432/cloud_lab
    ports:
      - "3000:3000"
    volumes:
      - ./server/src:/app/src
    command: sh -c "npm run migrate && npm run seed && npm run dev"

volumes:
  cloud_lab_pgdata:
