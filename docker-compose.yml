services:
  postgres:
    image: postgres:16-alpine
    container_name: cloud-lab-postgres
    environment:
      POSTGRES_USER: cloud_lab_dev
      POSTGRES_PASSWORD: cloud_lab_dev_password
      POSTGRES_DB: cloud_lab
    ports:
      - "5432:5432"
    volumes:
      - cloud_lab_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloud_lab_dev -d cloud_lab"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./server
    container_name: cloud-lab-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENVIRONMENT: development
      AUTH_MODE: mock
      SESSION_SECRET: dev-only-docker-session-secret-change-me
      DATABASE_URL: postgresql+asyncpg://cloud_lab_dev:cloud_lab_dev_password@postgres:5432/cloud_lab
    ports:
      - "3000:3000"
    volumes:
      - ./server/app:/app/app
      - ./server/alembic:/app/alembic
      - ./server/scripts:/app/scripts
    command: sh -c "alembic upgrade head && python -m scripts.seed && uvicorn app.main:app --host 0.0.0.0 --port 3000 --reload"

volumes:
  cloud_lab_pgdata:
