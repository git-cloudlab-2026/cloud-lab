services:
  postgres:
    image: postgres:16-alpine
    container_name: cloud-lab-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cloud_lab_dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloud_lab_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-cloud_lab}
    ports:
      - "5432:5432"
    volumes:
      - cloud_lab_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloud_lab_dev -d cloud_lab"]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./app
    container_name: cloud-lab-frontend
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  cloud_lab_pgdata:
